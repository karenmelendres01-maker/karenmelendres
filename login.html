<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login / Register</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
    <div class="form-container" id="form-container">

        <!-- Login Form -->
        <form id="login-form" class="form active">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-pass" placeholder="Password" required>
            <button type="button" onclick="doLogin()">Login</button>
            <p>Don't have an account? <span onclick="toggleForm()">Register</span></p>
        </form>

        <!-- Registration Form -->
        <form id="register-form" class="form">
            <h2>Register</h2>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-pass" placeholder="Password" required>
            <button type="button" onclick="doRegister()">Register</button>
            <p>Already have an account? <span onclick="toggleForm()">Login</span></p>
        </form>

    </div>
</div>

<script src="login.js"></script>
</body>
</html>
